services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: statutelens
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql

volumes:
  pgdata:
